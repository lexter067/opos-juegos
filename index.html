<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1F4E79">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Juegos Opos · Técnico de Hacienda</title>
<style>
:root{--azul:#1F4E79;--azul2:#2e6da4;--ok:#2e744f;--ko:#b3261e;--amb:#9a6700;--bg:#eef1f5;--card:#fff;--mut:#5a6b7b;}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#1c2530;line-height:1.45}
.wrap{max-width:820px;margin:0 auto;padding:16px}
h1{color:var(--azul);font-size:21px;margin:4px 0}
h2{color:var(--azul);font-size:15px;margin:18px 0 8px;border-bottom:2px solid #dce3ea;padding-bottom:4px}
.sub{color:var(--mut);font-size:13px;margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.tile{background:var(--card);border:1px solid #dce3ea;border-radius:12px;padding:13px 14px;cursor:pointer;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tile:hover{border-color:var(--azul2);transform:translateY(-1px)}
.tile .t{font-weight:600;color:var(--azul);font-size:15px}
.tile .d{font-size:12.5px;color:var(--mut);margin-top:3px}
.tile .n{font-size:11px;color:#8a99a8;margin-top:6px}
.card{background:var(--card);border:1px solid #dce3ea;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
.btn{background:var(--azul);color:#fff;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-weight:600;font-size:14px}
.btn:hover{background:#163a5c}.btn.sec{background:#e7edf3;color:var(--azul)}.btn.sm{padding:6px 11px;font-size:13px}
.btn:disabled{opacity:.5;cursor:default}
.chip{display:inline-block;border:1.5px solid var(--azul);color:var(--azul);background:#fff;border-radius:999px;padding:5px 12px;font-size:13px;cursor:pointer;margin:3px}
.chip.on{background:var(--azul);color:#fff}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid #d6dde6;border-radius:10px;padding:11px 13px;margin:7px 0;cursor:pointer;font-size:14.5px}
.opt:hover{border-color:var(--azul2)}.opt .k{display:inline-block;width:23px;height:23px;line-height:23px;text-align:center;border-radius:6px;background:#eef2f7;color:var(--azul);font-weight:700;margin-right:8px}
.opt.ok{border-color:var(--ok);background:#eaf6ef}.opt.ko{border-color:var(--ko);background:#fbecea}.opt.selL{border-color:var(--azul);background:#e6eef7}
.opt.ok .k{background:var(--ok);color:#fff}.opt.ko .k{background:var(--ko);color:#fff}
.badge{display:inline-block;background:#eef2f7;color:var(--azul);border-radius:6px;padding:2px 9px;font-size:12px;font-weight:600}
.q{font-size:16.5px;font-weight:600;margin:8px 0 10px}
.just{background:#f7f9fc;border-left:4px solid var(--azul);padding:9px 12px;border-radius:5px;font-size:13.5px;color:#33414f;margin-top:9px}
.stat{display:flex;gap:14px;font-size:13px;color:#33414f;flex-wrap:wrap}.stat b{color:var(--azul)}
.bar{height:7px;background:#e0e6ec;border-radius:6px;overflow:hidden;margin:8px 0}.bar>i{display:block;height:100%;background:var(--azul);width:0;transition:.2s}
.big{font-size:38px;font-weight:800;color:var(--azul)}.center{text-align:center}
input[type=text],textarea,select{font-size:15px;font-family:inherit;border:1.5px solid #ccd5de;border-radius:8px;padding:7px 9px}
textarea{width:100%;min-height:120px}
.gap{display:inline-block;border:none;border-bottom:2px solid var(--azul);background:#f3f7fb;min-width:60px;text-align:center;border-radius:4px 4px 0 0;margin:0 2px}
.gap.ok{background:#eaf6ef;border-color:var(--ok)}.gap.ko{background:#fbecea;border-color:var(--ko)}
.word{cursor:pointer;padding:1px 2px;border-radius:4px}.word.sel{background:#ffe9a8}.word.bad{background:#fbecea;color:var(--ko);font-weight:700}.word.good{background:#eaf6ef;color:var(--ok);font-weight:700}
.timer{font-variant-numeric:tabular-nums;font-weight:700;color:var(--azul)}
.timer.warn{color:var(--ko)}
.muted{color:var(--mut);font-size:13px}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.zone{border:1.5px dashed #c3cdd8;border-radius:10px;padding:10px;text-align:center}
ul.chk{list-style:none;padding:0}ul.chk li{padding:6px 8px;border-bottom:1px solid #eef2f6;cursor:pointer;font-size:14px}ul.chk li:before{content:'⬜ ';}ul.chk li.on:before{content:'✅ ';}
a.lnk{color:var(--azul);cursor:pointer;text-decoration:underline;font-size:13px}
.lectura{font-size:15px;line-height:1.6}.lectura h4{color:var(--azul);font-size:15px;margin:14px 0 4px}.lectura p{margin:6px 0}.lectura p.h5{font-weight:600;margin:8px 0 2px}.lectura ul{margin:6px 0 6px 4px;padding-left:18px}.lectura li{margin:3px 0}.lectura table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13.5px}.lectura td{border:1px solid #d6dde6;padding:5px 7px;vertical-align:top}
</style>
</head>
<body>
<div class="wrap">
  <div class="between">
    <h1 id="title">🎮 Juegos Opos · Técnico de Hacienda</h1>
    <button class="btn sec sm" id="home" style="display:none">← Menú</button>
  </div>
  <div id="app"></div>
  <div class="sub center" style="margin-top:18px">Todo offline · generado de tu material de estudio. El banco de errores y la repetición espaciada se guardan en este navegador.</div>
</div>
<script src="datos.js"></script>
<script src="contenido.js"></script>
<script src="firebase-config.js"></script>
<script>
const D = window.DATOS, BLOCKS = D.meta.blocks, EXAM1 = D.meta.exam1;
const $ = s=>document.querySelector(s), app=$('#app');
const el=(t,c,html)=>{const e=document.createElement(t);if(c)e.className=c;if(html!=null)e.innerHTML=html;return e;};
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const byB=(arr,set)=>arr.filter(x=>set.has(x.b));
const norm=s=>(s||'').toString().toLowerCase().replace(/\s+/g,'').replace(/[.,;]+$/,'').replace('%','').trim();
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const LS={get:(k,d)=>{try{return JSON.parse(localStorage.getItem('thac_'+k))??d}catch(e){return d}},set:(k,v)=>localStorage.setItem('thac_'+k,JSON.stringify(v))};
$('#home').onclick=showHome;
function setTitle(t){$('#title').textContent=t;$('#home').style.display=t.includes('Juegos Opos')?'none':'inline-block';}

/* ---------- BANCO DE ERRORES ---------- */
function banco(){return LS.get('banco',[])}
function addErr(item){const b=banco();const key=item.kind+'|'+item.b+'|'+(item.q||item.contenido||item.titulo||'').slice(0,60);if(!b.find(x=>x.key===key)){b.push({key,...item});LS.set('banco',b);}}
function delErr(key){LS.set('banco',banco().filter(x=>x.key!==key))}
/* ---------- ESTADÍSTICAS por tema + racha ---------- */
function recordStat(b,t,ok){const s=LS.get('stats',{});const k=b+'|'+(t||'?');s[k]=s[k]||{g:0,n:0};s[k].n++;if(ok)s[k].g++;LS.set('stats',s);touchStreak();}
function touchStreak(){const today=new Date().toISOString().slice(0,10);const st=LS.get('streak',{last:'',count:0});if(st.last===today)return;const y=new Date(Date.now()-86400000).toISOString().slice(0,10);st.count=(st.last===y)?(st.count||0)+1:1;st.last=today;LS.set('streak',st);}

/* ---------- HOME ---------- */
function tile(t,d,n,fn){const e=el('div','tile');e.innerHTML=`<div class="t">${t}</div><div class="d">${d}</div>${n?`<div class="n">${n}</div>`:''}`;e.onclick=fn;return e;}
function section(title){const h=el('h2',null,title);app.appendChild(h);const g=el('div','grid');app.appendChild(g);return g;}
function showHome(){
  setTitle('🎮 Juegos Opos · Técnico de Hacienda');app.innerHTML='';
  let g=section('⭐ Empieza aquí');
  g.appendChild(tile('🔥 Repaso del día','Sesión mixta: tus errores + preguntas nuevas. Hazla cada día para mantener la racha',null,()=>repasoDia()));
  g.appendChild(tile('📚 Temari (estudiar)','Lee cada tema en texto completo y practica al terminar',(window.CONTENIDO||[]).length+' temas',()=>showTemario()));
  g=section('🏆 Competición con Judith');
  g.appendChild(tile('⚔ Duelo 1v1','Reto en directo: mismas preguntas, gana quien más acierte',null,()=>cfgDuel()));
  g.appendChild(tile('🔥 Reto diario','Mismas preguntas para los dos hoy; sube tu nota y compite',null,()=>retoDiario()));
  g.appendChild(tile('🏆 Clasificación','Ranking de hoy / semana / total'+(onlineReady()?'':' (configura Firebase)'),null,()=>showLeaderboard()));
  g=section('📝 Examen 1 · Test (Civil, Mercantil, Economía, Administrativo)');
  g.appendChild(tile('Simulacro AEAT','Test con penalización por error, cronómetro e informe por bloques','Réplica del examen real',()=>cfgTest({exam:'aeat'})));
  g.appendChild(tile('Test por bloque/tema','Práctica libre, corrección al instante con justificación',D.test.length+' preguntas',()=>cfgTest({exam:'libre'})));
  g=section('📒 Examen 2 · Contabilidad (práctico)');
  g.appendChild(tile('Test de Contabilidad','Conceptos, cuentas y reglas en formato test',byB(D.test,new Set(['Contabilidad'])).length+' preguntas',()=>runQuiz(shuffle(byB(D.test,new Set(['Contabilidad']))).slice(0,25),{})));
  g.appendChild(tile('Flashcards Contabilidad','Repaso rápido de cuentas y conceptos',null,()=>startSRS(new Set(['Contabilidad']))));
  g.appendChild(tile('⚠ Práctica de asientos','Lo decisivo del 2.º ejercicio se entrena con los Ejercicios y los 25 supuestos oficiales (carpeta Contabilidad)','Material externo',()=>alert('La práctica de asientos está en Estudio/Contabilidad: Contabilidad_Ejercicios y Contabilidad_Examenes_Oficiales (25 supuestos resueltos). Este juego cubre los conceptos en test/flashcards.')));
  g=section('🎓 Examen 3 · Preguntas de todo + Desarrollo');
  g.appendChild(tile('Pregunta de TODO','Mezcla preguntas de los 6 bloques',D.test.length+' preguntas',()=>runQuiz(shuffle(D.test).slice(0,30),{})));
  g.appendChild(tile('Explica un tema','Desarrolla un tema y autoevalúa con su guión de epígrafes',D.temas.length+' temas',()=>cfgDesarrollo()));
  g.appendChild(tile('Casos prácticos','Mini-supuestos tipo test (aplicar, no solo memorizar)',D.test.filter(q=>CASO_RE.test(q.q)).length+' casos',()=>startCasos()));
  g=section('🧠 Memorización de datos duros');
  g.appendChild(tile('Cloze de cifras y plazos','Rellena números, plazos y porcentajes de memoria',D.cloze.filter(c=>c.kind==='cifras').length+' frases',()=>cfgCloze('cifras')));
  g.appendChild(tile('Cloze legal','Rellena artículos, leyes y datos clave',D.cloze.filter(c=>c.kind==='legal').length+' frases',()=>cfgCloze('legal')));
  g.appendChild(tile('Flashcards SRS','Repetición espaciada (Leitner) según tus errores',D.flashcards.length+' tarjetas',()=>cfgSRS()));
  g.appendChild(tile('Mapa mental','Desbloquea los epígrafes de un tema acertando preguntas',D.temas.length+' temas',()=>cfgMapa()));
  g=section('🔍 Comprensión y aplicación');
  g.appendChild(tile('Detección de errores','Encuentra los datos alterados contra reloj',D.errores.length+' párrafos',()=>cfgErrores()));
  g.appendChild(tile('Comparación rápida','Asigna cada característica a la figura correcta',D.comparacion.length+' cuadros',()=>cfgComp()));
  g.appendChild(tile('Ordenar / reconstruir','Coloca pasos y enumeraciones en su orden',D.procedimientos.length+' enumeraciones',()=>cfgOrden()));
  g.appendChild(tile('Dictado conceptual','Lee una definición, tápala y reescríbela',D.definiciones.length+' definiciones',()=>cfgDictado()));
  g=section('🎲 Más juegos');
  g.appendChild(tile('💀 Supervivencia','Encadena aciertos con 3 vidas. ¿Hasta dónde llegas?',null,()=>startSurvival()));
  g.appendChild(tile('🔗 Emparejar','Une enunciado y respuesta a contrarreloj',null,()=>startMatch()));
  g.appendChild(tile('⚖ Verdadero / Falso','¿La respuesta propuesta encaja con la pregunta?',null,()=>startVF()));
  g.appendChild(tile('📊 Tabla completa','Clasifica todos los rasgos de un cuadro comparativo',D.comparacion.length+' cuadros',()=>startTabla()));
  g.appendChild(tile('⚔ Boss del bloque','Examen difícil; gana la medalla del bloque (8/10)',null,()=>cfgBoss()));
  g=section('📊 Mi progreso');
  g.appendChild(tile('Banco de errores','Repasa lo que has fallado (prioritario)',banco().length+' guardados',()=>showBanco()));
  g.appendChild(tile('Estadísticas / reiniciar','Ver tu progreso o borrar datos guardados',null,()=>showStats()));
}

/* ---------- helpers de configuración ---------- */
function blockChooser(initial){
  const box=el('div');box.innerHTML='<div class="sub">Bloques:</div>';const wrap=el('div');
  const sel=new Set(initial||BLOCKS);
  BLOCKS.forEach(b=>{const c=el('span','chip'+(sel.has(b)?' on':''),b);c.onclick=()=>{c.classList.toggle('on');c.classList.contains('on')?sel.add(b):sel.delete(b);};wrap.appendChild(c);});
  box.appendChild(wrap);box._sel=sel;return box;
}

/* ---------- MOTOR QUIZ ---------- */
function cfgTest(o){
  setTitle(o.exam==='aeat'?'Simulacro AEAT':'Test por bloque/tema');app.innerHTML='';
  const c=el('div','card');
  const bc=blockChooser(o.exam==='aeat'?EXAM1:BLOCKS);c.appendChild(bc);
  c.insertAdjacentHTML('beforeend','<div class="sub" style="margin-top:10px">Nº de preguntas:</div>');
  const selN=el('select');[10,25,50,75,100].forEach(n=>selN.add(new Option(n,n)));selN.value=o.exam==='aeat'?'50':'25';c.appendChild(selN);
  if(o.exam==='aeat'){c.insertAdjacentHTML('beforeend','<div class="sub" style="margin-top:10px">Tiempo (min):</div>');var selT=el('select');[15,30,45,60,90].forEach(n=>selT.add(new Option(n,n)));selT.value='45';c.appendChild(selT);}
  c.appendChild(el('div',null,'<br>'));
  const go=el('button','btn','▶ Empezar');c.appendChild(go);
  go.onclick=()=>{const pool=shuffle(byB(D.test,bc._sel));if(!pool.length)return alert('Elige algún bloque.');
    runQuiz(pool.slice(0,+selN.value),{penaliza:o.exam==='aeat',timeLimit:o.exam==='aeat'?+selT.value*60:0,porBloque:o.exam==='aeat'});};
  app.appendChild(c);
}
function runQuiz(qs,opt){
  if(!qs.length)return alert('No hay preguntas.');
  setTitle(opt.penaliza?'Simulacro AEAT':'Test');app.innerHTML='';
  let i=0,good=0,bad=0,blank=0,streak=0,answered=false,remain=opt.timeLimit||0,timer=null;
  const perB={};
  const c=el('div','card');app.appendChild(c);
  const head=el('div','between');c.appendChild(head);
  const bar=el('div','bar');bar.innerHTML='<i></i>';c.appendChild(bar);
  const body=el('div');c.appendChild(body);
  if(opt.timeLimit){timer=setInterval(()=>{remain--;draw();if(remain<=0){clearInterval(timer);finish();}},1000);}
  function draw(){
    const q=qs[i];
    head.innerHTML=`<div class="stat"><span>Pregunta <b>${i+1}</b>/${qs.length}</span><span>✅ <b>${good}</b></span><span>❌ <b>${bad}</b></span>${opt.penaliza?`<span>Nota <b>${score().toFixed(2)}</b></span>`:`<span>🔥<b>${streak}</b></span>`}</div>`+
      (opt.timeLimit?`<span class="timer ${remain<60?'warn':''}">${fmt(Math.max(0,remain))}</span>`:'');
    bar.firstChild.style.width=(i/qs.length*100)+'%';
  }
  function render(){
    answered=false;const q=qs[i];draw();body.innerHTML='';
    const brow=el('div','between');brow.appendChild(el('span','badge',`${q.b} · Tema ${q.t}`));
    const sp=el('button','btn sec sm','🔊');sp.title='Leer';sp.onclick=()=>speak(q.q+'. '+q.op.map((o,k)=>'ABCD'[k]+': '+o).join('. '));brow.appendChild(sp);body.appendChild(brow);
    body.appendChild(el('div','q',q.q));
    q.op.forEach((o,idx)=>{const b=el('button','opt',`<span class="k">${'ABCD'[idx]}</span>${o}`);b.onclick=()=>choose(idx,b);body.appendChild(b);});
    const nav=el('div','between');nav.style.marginTop='10px';
    const skip=el('button','btn sec sm','Saltar (en blanco) →');skip.onclick=()=>{blank++;next();};
    const nx=el('button','btn sm','Siguiente →');nx.style.display='none';nx.id='nx';
    nav.appendChild(skip);nav.appendChild(nx);body.appendChild(nav);
  }
  function choose(idx,btn){
    if(answered)return;answered=true;const q=qs[i];
    perB[q.b]=perB[q.b]||{g:0,t:0};perB[q.b].t++;
    [...body.querySelectorAll('.opt')].forEach((b,k)=>{b.disabled=true;if(k===q.ok)b.classList.add('ok');});
    if(idx===q.ok){good++;streak++;perB[q.b].g++;}
    else{bad++;streak=0;btn.classList.add('ko');addErr({kind:'test',b:q.b,q:q.q,op:q.op,ok:q.ok,just:q.just,t:q.t});}
    recordStat(q.b,q.t,idx===q.ok);
    if(q.just)body.appendChild(el('div','just',q.just));
    const nx=$('#nx');nx.style.display='inline-block';nx.onclick=next;nx.focus();draw();
  }
  function next(){i++;if(i>=qs.length)finish();else render();}
  function score(){const p=good-(opt.penaliza?bad/3:0);return Math.max(0,p/qs.length*10);}
  function finish(){
    if(timer)clearInterval(timer);setTitle('Resultado');app.innerHTML='';
    const r=el('div','card center');
    const nota=score();
    r.innerHTML=`<div class="big">${nota.toFixed(2)} / 10</div><div class="muted">${good} aciertos · ${bad} fallos · ${blank} en blanco${opt.penaliza?' · (penalización −1/3 por fallo)':''}</div>`;
    if(opt.porBloque){let t='<table style="width:100%;margin-top:14px;font-size:14px"><tr><th align=left>Bloque</th><th>Aciertos</th><th>%</th></tr>';
      Object.keys(perB).forEach(b=>{const x=perB[b];t+=`<tr><td>${b}</td><td align=center>${x.g}/${x.t}</td><td align=center>${Math.round(x.g/x.t*100)}%</td></tr>`;});t+='</table>';r.insertAdjacentHTML('beforeend',t);}
    if(opt.onEnd){const extra=opt.onEnd(nota,good,bad,qs.length);if(extra)r.insertAdjacentHTML('beforeend',extra);}
    const again=el('button','btn','↻ Otra vez');again.onclick=showHome;r.appendChild(el('div',null,'<br>'));r.appendChild(again);
    app.appendChild(r);
  }
  render();
}

/* ---------- SRS (Leitner) ---------- */
const SRS_INT=[0,1,3,7,16,30]; // días por caja 1..5
function cfgSRS(){setTitle('Flashcards SRS');app.innerHTML='';const c=el('div','card');const bc=blockChooser();c.appendChild(bc);
  c.insertAdjacentHTML('beforeend','<div class="sub" style="margin-top:10px">Tarjetas nuevas por sesión:</div>');const s=el('select');[10,20,30,50].forEach(n=>s.add(new Option(n,n)));s.value='20';c.appendChild(s);
  c.appendChild(el('div',null,'<br>'));const go=el('button','btn','▶ Empezar');go.onclick=()=>startSRS(bc._sel,+s.value);c.appendChild(go);app.appendChild(c);}
function startSRS(set,nNew){
  nNew=nNew||20;setTitle('Flashcards SRS');app.innerHTML='';
  const srs=LS.get('srs',{}),now=Date.now();
  const pool=byB(D.flashcards,set);
  const due=[],fresh=[];
  pool.forEach(c=>{const id=c.b+'|'+c.q;const s=srs[id];if(s){if(s.due<=now)due.push(c);}else fresh.push(c);});
  let queue=shuffle(due).concat(shuffle(fresh).slice(0,nNew));
  if(!queue.length)return showInfo('¡Sin tarjetas pendientes!','No hay tarjetas vencidas ni nuevas en esos bloques. Vuelve más tarde o elige otros bloques.');
  queue=shuffle(queue);let i=0,good=0,bad=0;
  const c=el('div','card');app.appendChild(c);
  function show(){
    const card=queue[i];c.innerHTML='';
    c.appendChild(el('div','between',`<div class="stat"><span><b>${i+1}</b>/${queue.length}</span><span>✅ <b>${good}</b></span><span>❌ <b>${bad}</b></span></div><span class="badge">${card.b} · T${card.t}</span>`));
    c.appendChild(el('div','q',card.q));
    const rev=el('div','just');rev.style.display='none';rev.textContent=card.a;c.appendChild(rev);
    const showBtn=el('button','btn','Mostrar respuesta');
    const rate=el('div','row');rate.style.display='none';
    const ksi=el('button','btn','✅ La sabía'),kno=el('button','btn sec','❌ Fallé');kno.style.background='#fbecea';kno.style.color='#b3261e';
    rate.appendChild(ksi);rate.appendChild(kno);
    showBtn.onclick=()=>{rev.style.display='block';showBtn.style.display='none';rate.style.display='flex';};
    ksi.onclick=()=>grade(card,true);kno.onclick=()=>grade(card,false);
    c.appendChild(showBtn);c.appendChild(rate);
  }
  function grade(card,ok){
    const srs=LS.get('srs',{});const id=card.b+'|'+card.q;const box=ok?Math.min(5,((srs[id]&&srs[id].box)||0)+1):1;
    srs[id]={box,due:Date.now()+SRS_INT[box]*86400000};LS.set('srs',srs);

function onlineReady(){return !!(window.FIREBASE_CONFIG&&window.FIREBASE_CONFIG.apiKey);}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('No se pudo cargar Firebase (¿sin internet?)'));document.head.appendChild(s);});}
let _fbP=null;
function ensureFB(){if(_fbP)return _fbP;_fbP=(async()=>{if(!window.firebase){await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js');}firebase.initializeApp(window.FIREBASE_CONFIG);return firebase.firestore();})();return _fbP;}
function getNombre(){let n=LS.get('nombre','');if(!n){n=(prompt('Tu nombre para la clasificación (lo verá la Judith):')||'Anónimo').slice(0,24);LS.set('nombre',n);}return n;}
function hoyStr(){return new Date().toISOString().slice(0,10);}
function semanaStr(){const d=new Date(),o=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=o.getUTCDay()||7;o.setUTCDate(o.getUTCDate()+4-day);const ys=new Date(Date.UTC(o.getUTCFullYear(),0,1));const wk=Math.ceil(((o-ys)/86400000+1)/7);return o.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');}
function postScore(modo,score){if(!onlineReady())return '<div class="muted" style="margin-top:8px">🔒 Configura Firebase (firebase-config.js) para subir a la clasificación.</div>';
  ensureFB().then(db=>db.collection('scores').add({nombre:getNombre(),modo,score,dia:hoyStr(),semana:semanaStr(),ts:Date.now()})).catch(()=>{});
  return '<div class="muted" style="margin-top:8px">✅ Enviando a la clasificación como <b>'+getNombre()+'</b>…</div>';}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function seededPick(arr,rng,n){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,n);}
function retoDiario(){const seed=+hoyStr().replace(/-/g,'');const pool=seededPick(D.test,mulberry32(seed),20);setTitle('🔥 Reto diario');
  runQuiz(pool,{penaliza:true,onEnd:(nota)=>{touchStreak();return '<div class="just">Reto de HOY (mismas preguntas para todos).'+postScore('RetoDiario',Math.max(0,Math.round((nota||0)*10)))+'<br><span class="muted">La Judith tiene el mismo reto hoy. ¡A ver quién puntúa más!</span></div>';}});}
function showLeaderboard(){setTitle('🏆 Clasificación');app.innerHTML='';
  if(!onlineReady()){app.appendChild(el('div','card','<div class="muted">🔒 Falta configurar Firebase. Abre <b>firebase-config.js</b> y pega tu configuración (ver GUIA_ONLINE.md). Mientras, podéis competir comparando capturas del resultado. 😄</div>'));return;}
  const c=el('div','card');const ctl=el('div','chips');['Hoy','Semana','Total'].forEach((p,ix)=>{const b=el('span','chip'+(ix===2?' on':''),p);b.onclick=()=>{[...ctl.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');load(p);};ctl.appendChild(b);});c.appendChild(ctl);const list=el('div');c.appendChild(list);app.appendChild(c);
  const nm=el('button','btn sec sm','Cambiar mi nombre ('+(LS.get('nombre','sin nombre'))+')');nm.onclick=()=>{LS.set('nombre','');getNombre();showLeaderboard();};app.appendChild(nm);
  function load(period){list.innerHTML='<div class="muted">Cargando…</div>';
    ensureFB().then(db=>db.collection('scores').orderBy('score','desc').limit(400).get()).then(s=>{let rows=[];s.forEach(d=>rows.push(d.data()));
      if(period==='Hoy')rows=rows.filter(r=>r.dia===hoyStr());else if(period==='Semana')rows=rows.filter(r=>r.semana===semanaStr());
      const best={};rows.forEach(r=>{if(!best[r.nombre]||r.score>best[r.nombre].score)best[r.nombre]=r;});
      const arr=Object.values(best).sort((a,b)=>b.score-a.score).slice(0,50);
      list.innerHTML=arr.length?('<table style="width:100%;font-size:14px;margin-top:8px"><tr><th>#</th><th align=left>Nombre</th><th>Pts</th><th align=left>Modo</th></tr>'+arr.map((r,i)=>`<tr><td align=center>${['🥇','🥈','🥉'][i]||(i+1)}</td><td>${r.nombre}</td><td align=center><b>${r.score}</b></td><td style="font-size:12px">${r.modo||''}</td></tr>`).join('')+'</table>'):'<div class="muted">Sin puntuaciones en este periodo. ¡Sé el primero!</div>';
    }).catch(e=>list.innerHTML='<div class="muted">Error: '+e.message+'. (¿Reglas de Firestore en modo test?)</div>');}
  load('Total');}

async function crearDuelo(){const nombre=getNombre();const qs=shuffle(D.test).slice(0,10).map(q=>({q:q.q,op:q.op,ok:q.ok,b:q.b,t:q.t}));const code=rndCode();

  try{const db=await ensureFB();const ref=db.collection('duels').doc(code);await ref.set({qs,a:{nombre,score:0,i:0,done:false},b:null,status:'esperando',ts:Date.now()});
    const unsub=ref.onSnapshot(s=>{const d=s.data();if(d&&d.b){unsub();runDuel(qs,code,true);}});}
  catch(e){showInfo('Error','No se pudo crear el duelo: '+e.message);}}
async function unirseDuelo(code){const nombre=getNombre();try{const db=await ensureFB();const ref=db.collection('duels').doc(code);const s=await ref.get();
  if(!s.exists)return alert('No existe ese duelo (revisa el código).');const d=s.data();if(d.b)return alert('Ese duelo ya está completo.');

function runDuel(qs,code,soyA){setTitle('⚔ Duelo '+code);app.innerHTML='';let i=0,score=0,answered=false,ended=false;const me=soyA?'a':'b',other=soyA?'b':'a';const c=el('div','card');app.appendChild(c);
  ensureFB().then(db=>{const ref=db.collection('duels').doc(code);const oppBox=el('div','badge');oppBox.style.background='#fdeccb';oppBox.textContent='Esperando al rival…';
    const unsub=ref.onSnapshot(s=>{const d=s.data();if(!d)return;const o=d[other];if(o)oppBox.textContent='Rival '+o.nombre+': '+o.score+' aciertos ('+o.i+'/'+qs.length+')';
      if(d.a&&d.b&&d.a.done&&d.b.done&&!ended){ended=true;unsub();fin(d);}});
    function show(){answered=false;const q=qs[i];c.innerHTML='';c.appendChild(el('div','between',`<span>Tú: <b>${score}</b> · ${i+1}/${qs.length}</span>`));c.appendChild(oppBox);

        const upd={};upd[me]={nombre:getNombre(),score,i:i+1,done:i+1>=qs.length};ref.update(upd).catch(()=>{});
        setTimeout(()=>{i++;if(i>=qs.length){c.innerHTML='';c.appendChild(oppBox);c.appendChild(el('div','q','Has terminado con '+score+' aciertos.'));c.appendChild(el('div','muted','Esperando a que tu rival acabe…'));}else show();},650);};c.appendChild(b);});}
    function fin(d){setTitle('⚔ Resultado');app.innerHTML='';const r=el('div','card center');const ms=d[me].score,os=d[other].score;const win=ms>os?'🏆 ¡Ganas tú!':(ms<os?'😤 Gana tu rival':'🤝 ¡Empate!');
      r.innerHTML='<div class="big">'+ms+' – '+os+'</div><div style="margin:6px 0;font-size:18px">'+win+'</div><div class="muted">'+d.a.nombre+': '+d.a.score+' · '+d.b.nombre+': '+d.b.score+'</div>';

    ['Racha 3 días',st.count>=3],['Racha 7 días',st.count>=7],
    ['100 tarjetas SRS',Object.keys(srs).length>=100],['Caja 5 alcanzada',Object.values(srs).some(s=>s.box>=5)],
    ['80% global',tot>=50&&acc/tot>=0.8],['Banco a cero',tot>=50&&banco().length===0]];
  const lg=el('div','card');lg.innerHTML='<b>🏅 Logros</b><div class="chips" style="margin-top:8px">'+
    logros.map(([n,ok])=>`<span class="chip${ok?' on':''}" style="cursor:default">${ok?'✅':'🔒'} ${n}</span>`).join('')+'</div>';
  app.appendChild(lg);
  // puntos débiles por tema
  const weak=Object.entries(stats).filter(([k,s])=>s.n>=3&&s.g/s.n<0.6).sort((a,b)=>a[1].g/a[1].n-b[1].g/b[1].n).slice(0,12);
  const wk=el('div','card');wk.innerHTML='<b>⚠ Puntos débiles (a repasar)</b>';
  if(!weak.length)wk.insertAdjacentHTML('beforeend','<div class="muted">Aún sin datos suficientes. Juega más para detectar tus temas flojos.</div>');
  else{wk.insertAdjacentHTML('beforeend','<table style="width:100%;margin-top:8px;font-size:14px"><tr><th align=left>Bloque · Tema</th><th>Acierto</th></tr>'+
    weak.map(([k,s])=>{const[b,t]=k.split('|');return `<tr><td>${b} · T${t}</td><td align=center>${Math.round(s.g/s.n*100)}% (${s.g}/${s.n})</td></tr>`;}).join('')+'</table>');}
  app.appendChild(wk);
  const r=el('button','btn sec','Reiniciar todo el progreso');r.onclick=()=>{if(confirm('¿Borrar SRS, banco, estadísticas y racha?')){['srs','banco','stats','streak'].forEach(k=>localStorage.removeItem('thac_'+k));showStats();}};app.appendChild(r);
}
function showInfo(t,msg){setTitle(t);app.innerHTML='';const c=el('div','card center');c.innerHTML=`<div class="big">✓</div><div style="margin:8px 0 14px">${msg}</div>`;const b=el('button','btn','← Menú');b.onclick=showHome;c.appendChild(b);app.appendChild(c);}

showHome();
if(location.protocol.startsWith('http')&&'serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
